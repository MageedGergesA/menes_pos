<!DOCTYPE html>
<!-- Part of the Mezze POS platform. Public post-order feedback page. -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Rate your order · Mezze</title>
<style>
  :root{
    --bg:#fbf6ee;--card:#ffffff;--card2:#fff9f0;--ink:#20180f;--ink2:#6e6152;--ink3:#a89a86;--line:#ece1d0;
    --accent:#e8892b;--accent-d:#cf6f16;--accent-ink:#fff;--star:#f4b740;--ok:#2f9e6b;
    --hero1:#f6a545;--hero2:#e8722b;--hero3:#c9541b;--r:22px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#15100b;--card:#211a13;--card2:#271f16;--ink:#f7efe4;--ink2:#c6b6a2;--ink3:#8b7c69;--line:#2f261c;
    --accent:#f59a3c;--accent-d:#e07f1e;--accent-ink:#1c1305;--star:#f6b93b;--ok:#3aa572;
    --hero1:#c47a2a;--hero2:#a85820;--hero3:#7a3d14;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
  body.rtl{direction:rtl}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:0 1px 3px rgba(32,24,15,.05),0 20px 50px rgba(32,24,15,.14);max-width:430px;width:100%;overflow:hidden;text-align:center}
  /* warm hero cap */
  .cap{position:relative;overflow:hidden;padding:30px 26px 22px;color:#fff;
    background:linear-gradient(135deg,var(--hero1),var(--hero2) 55%,var(--hero3))}
  .cap::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 150% at 90% -30%,rgba(255,255,255,.28),transparent 55%)}
  .cap>*{position:relative;z-index:1}
  .logo{width:60px;height:60px;border-radius:17px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.32);
    display:grid;place-items:center;font-weight:900;font-size:27px;color:#fff;margin:0 auto 14px;backdrop-filter:blur(4px)}
  h1{font-size:22px;font-weight:900;letter-spacing:-.01em;line-height:1.15}
  .sub{color:rgba(255,255,255,.9);font-size:13.5px;font-weight:600;margin-top:5px}
  .body{padding:24px 26px 28px}
  .stars{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
  .star{font-size:44px;line-height:1;color:var(--line);background:none;border:0;cursor:pointer;transition:transform .12s,color .12s}
  .star.on{color:var(--star);filter:drop-shadow(0 3px 6px rgba(244,183,64,.4))} .star:active{transform:scale(1.18)}
  .rlabel{height:22px;font-size:14.5px;font-weight:800;color:var(--accent-d);margin-bottom:18px;letter-spacing:.01em}
  textarea,input{width:100%;padding:14px;border-radius:13px;border:1px solid var(--line);background:var(--card2);color:var(--ink);
    font-size:15px;margin-bottom:11px;font-family:inherit}
  textarea:focus,input:focus{outline:none;border-color:var(--accent)}
  textarea{resize:none;min-height:88px}
  .btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:var(--accent-ink);border:0;border-radius:14px;
    padding:16px;font-size:15.5px;font-weight:900;letter-spacing:-.01em;box-shadow:0 6px 18px rgba(207,111,22,.32)}
  .btn:disabled{opacity:.45;box-shadow:none}
  .done .cap{background:linear-gradient(135deg,var(--ok),#248657)}
  .done .logo{background:rgba(255,255,255,.22)}
  .hidden{display:none}
  .lang{position:fixed;top:16px;inset-inline-end:16px;background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:8px 12px;font-size:12.5px;font-weight:800;color:var(--ink2)}
</style>
</head>
<body>
<button class="lang" id="lang">ع</button>
<div class="card" id="form">
  <div class="cap">
    <div class="logo">M</div>
    <h1 id="h" data-t="title">How was your order?</h1>
    <div class="sub" id="branch">—</div>
  </div>
  <div class="body">
    <div class="stars" id="stars"></div>
    <div class="rlabel" id="rlabel"></div>
    <textarea id="comment" data-tph="commentph" placeholder="Tell us more (optional)"></textarea>
    <input id="name" data-tph="nameph" placeholder="Your name (optional)">
    <button class="btn" id="send" disabled data-t="send">Send feedback</button>
  </div>
</div>
<div class="card done hidden" id="thanks">
  <div class="cap">
    <div class="logo">✓</div>
    <h1 data-t="thankst">Thank you!</h1>
    <div class="sub" data-t="thanksp">Your feedback helps us do better.</div>
  </div>
</div>
<script>
(function(){
  var $=function(s){return document.querySelector(s);};
  var Q=new URLSearchParams(location.search), STORE=Q.get('store')||'', ORDER=Q.get('order')||'';
  var lang=(Q.get('lang')==='ar'||localStorage.getItem('mezze_shop_lang')==='ar')?'ar':'en';
  var API='/mezze/api/v1', rating=0;
  var T={en:{title:'How was your order?',commentph:'Tell us more (optional)',nameph:'Your name (optional)',send:'Send feedback',thankst:'Thank you!',thanksp:'Your feedback helps us do better.',
             r:['','Poor','Fair','Good','Great','Excellent']},
         ar:{title:'كيف كان طلبك؟',commentph:'أخبرنا المزيد (اختياري)',nameph:'اسمك (اختياري)',send:'إرسال',thankst:'شكرًا لك!',thanksp:'رأيك يساعدنا على التحسّن.',
             r:['','ضعيف','مقبول','جيد','رائع','ممتاز']}};
  var t=function(k){return T[lang][k];};
  function applyI18n(){ document.body.classList.toggle('rtl',lang==='ar'); document.documentElement.lang=lang;
    document.querySelectorAll('[data-t]').forEach(function(e){e.textContent=t(e.getAttribute('data-t'));});
    document.querySelectorAll('[data-tph]').forEach(function(e){e.placeholder=t(e.getAttribute('data-tph'));});
    $('#lang').textContent=lang==='ar'?'EN':'ع'; renderStars(); }
  function call(path,body){ return fetch(location.origin+API+path,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({store:STORE},body||{}))}).then(function(r){return r.json();}); }
  function renderStars(){ var el=$('#stars'); el.innerHTML='';
    for(var i=1;i<=5;i++){(function(n){ var b=document.createElement('button'); b.className='star'+(n<=rating?' on':''); b.textContent='★';
      b.onclick=function(){ rating=n; renderStars(); $('#rlabel').textContent=t('r')[n]; $('#send').disabled=false; }; el.appendChild(b); })(i);} }
  call('/shop/config').then(function(d){ if(d&&d.ok)$('#branch').textContent=d.branch||'Mezze'; }).catch(function(){});
  applyI18n();
  $('#lang').onclick=function(){ lang=lang==='ar'?'en':'ar'; localStorage.setItem('mezze_shop_lang',lang); applyI18n(); if(rating)$('#rlabel').textContent=t('r')[rating]; };
  $('#send').onclick=async function(){ if(!rating)return; var b=this; b.disabled=true;
    try{ var d=await call('/feedback/submit',{rating:rating,comment:$('#comment').value.trim(),customer:$('#name').value.trim(),order_ref:ORDER});
      if(!d.ok)throw new Error(d.message||'error'); $('#form').classList.add('hidden'); $('#thanks').classList.remove('hidden');
    }catch(e){ alert(e.message); b.disabled=false; } };
})();
</script>
</body>
</html>
