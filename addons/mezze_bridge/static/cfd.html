<!DOCTYPE html>
<!-- Part of the Mezze POS platform. Customer-Facing Display (second screen). -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mezze · Display</title>
<style>
  :root{
    --bg:#fbf6ee;--panel:#ffffff;--panel2:#fff9f0;--ink:#20180f;--ink2:#6e6152;--ink3:#a89a86;--line:#ece1d0;
    --accent:#e8892b;--accent-d:#cf6f16;--ok:#2f9e6b;
    --hero1:#f6a545;--hero2:#e8722b;--hero3:#c9541b;
    --sh:0 1px 2px rgba(32,24,15,.05),0 14px 40px rgba(32,24,15,.10);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#15100b;--panel:#211a13;--panel2:#271f16;--ink:#f7efe4;--ink2:#c6b6a2;--ink3:#8b7c69;--line:#2f261c;
    --accent:#f59a3c;--accent-d:#e07f1e;--ok:#3aa572;
    --hero1:#c47a2a;--hero2:#a85820;--hero3:#7a3d14;
    --sh:0 1px 2px rgba(0,0,0,.4),0 16px 44px rgba(0,0,0,.5);
  }}
  *{box-sizing:border-box;margin:0;padding:0}
  button,input,select,textarea,a{touch-action:manipulation}
  button:not(:disabled),[role=button],a[href]{cursor:pointer}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  body.rtl{direction:rtl}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{display:flex;flex-direction:column;height:100%}
  /* branded header bar */
  header{position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;padding:22px 40px;color:#fff;
    background:linear-gradient(135deg,var(--hero1),var(--hero2) 55%,var(--hero3))}
  header::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 160% at 92% -30%,rgba(255,255,255,.28),transparent 55%)}
  header>*{position:relative;z-index:1}
  .logo{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
    display:grid;place-items:center;font-weight:900;font-size:24px;color:#fff;backdrop-filter:blur(4px)}
  .brand{font-size:24px;font-weight:900;letter-spacing:-.01em}
  .brand small{display:block;font-size:12.5px;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
  .conn{margin-inline-start:auto;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:rgba(255,255,255,.9);
    background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.26);padding:8px 14px;border-radius:22px}
  .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4)}
  .dot.on{background:#eafff3;box-shadow:0 0 0 4px rgba(255,255,255,.22)}
  main{flex:1;display:flex;min-height:0}
  .items{flex:1;overflow:auto;padding:20px 40px;scrollbar-width:thin}
  .row{display:flex;align-items:center;gap:20px;padding:18px 8px;border-bottom:1px solid var(--line);animation:in .3s ease}
  @keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .row .q{min-width:58px;height:44px;padding:0 12px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:900;color:var(--accent-d);background:color-mix(in srgb,var(--accent) 15%,transparent)}
  .row .n{flex:1;font-size:24px;font-weight:700;letter-spacing:-.01em}
  .row .p{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
  .side{width:38%;max-width:540px;background:var(--panel);border-inline-start:1px solid var(--line);box-shadow:var(--sh);
    display:flex;flex-direction:column;justify-content:flex-end;padding:40px}
  .trow{display:flex;justify-content:space-between;font-size:20px;color:var(--ink2);padding:11px 0;font-weight:600}
  .trow b{color:var(--ink);font-weight:800}
  .total{margin-top:16px;padding-top:22px;border-top:2px solid var(--line);display:flex;justify-content:space-between;align-items:baseline}
  .total span{font-size:22px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em}
  .total b{font-size:58px;font-weight:900;letter-spacing:-.03em;color:var(--accent)}
  .total b small{font-size:24px;color:var(--ink3);font-weight:800;margin-inline-end:10px}
  /* idle + paid overlays */
  .center{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;background:var(--bg)}
  .center.show{display:flex}
  .center h1{font-size:60px;font-weight:900;letter-spacing:-.03em}
  .center p{font-size:23px;color:var(--ink2);font-weight:600}
  .center .big{font-size:44px;font-weight:900;color:var(--accent)}
  .mono{width:96px;height:96px;border-radius:26px;background:linear-gradient(135deg,var(--hero1),var(--hero3));display:grid;place-items:center;
    font-size:46px;font-weight:900;color:#fff;margin-bottom:10px;box-shadow:0 16px 40px rgba(207,111,22,.4)}
  .ok .mono{background:linear-gradient(135deg,var(--ok),#248657);color:#fff;box-shadow:0 16px 40px rgba(47,158,107,.4)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">M</div>
    <div class="brand" id="brand">Mezze<small id="branch">Welcome</small></div>
    <div class="conn"><span class="dot" id="dot"></span><span id="connlbl">connecting…</span></div>
  </header>
  <main>
    <div class="items" id="items"></div>
    <div class="side">
      <div class="trow"><span data-t="sub">Subtotal</span><b class="num" id="sub">—</b></div>
      <div class="trow"><span data-t="svc">Service</span><b class="num" id="svc">—</b></div>
      <div class="trow"><span data-t="vat">VAT</span><b class="num" id="vat">—</b></div>
      <div class="total"><span data-t="total">TOTAL</span><b class="num"><small id="cur">EGP</small><span id="total">0</span></b></div>
    </div>
  </main>
</div>
<!-- idle welcome -->
<div class="center" id="idle"><div class="mono">M</div><h1 id="idle-h">Welcome</h1><p id="idle-p">Please wait to be served</p></div>
<!-- paid / thank you -->
<div class="center ok" id="paid"><div class="mono">✓</div><h1 id="paid-h">Thank you!</h1><p><span data-t="paid">Paid</span> · <span class="big num"><span id="paid-cur">EGP</span> <span id="paid-total">0</span></span></p><p id="paid-change"></p></div>

<script>
(function(){
  var $=function(s){return document.querySelector(s);};
  var Q=new URLSearchParams(location.search);
  var LANG=(Q.get('lang')==='ar')?'ar':'en';
  if(LANG==='ar')document.body.classList.add('rtl');
  var T={en:{sub:'Subtotal',svc:'Service',vat:'VAT',total:'TOTAL',paid:'Paid',welcome:'Welcome',wait:'Please wait to be served',thanks:'Thank you!',change:'Change',conn:'live',off:'offline'},
         ar:{sub:'المجموع',svc:'الخدمة',vat:'ضريبة',total:'الإجمالي',paid:'مدفوع',welcome:'أهلًا بك',wait:'برجاء الانتظار',thanks:'شكرًا لك!',change:'الباقي',conn:'مباشر',off:'غير متصل'}};
  var t=function(k){return (T[LANG][k]||k);};
  document.querySelectorAll('[data-t]').forEach(function(e){e.textContent=t(e.getAttribute('data-t'));});
  $('#idle-h').textContent=t('welcome'); $('#idle-p').textContent=t('wait'); $('#paid-h').textContent=t('thanks');
  var EGP=function(n){return (Math.round((n||0)*100)/100).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});};
  var INT=function(n){return Math.round(n||0).toLocaleString('en');};

  var BASE=location.origin, API='/mezze/api/v1';
  var TOKEN=Q.get('token')||'';
  var CONFIG=parseInt(Q.get('config')||'0',10)||null;
  var CUR='EGP', CHANNEL=null, busLast=0, ws=null, wsRetry=0;

  function call(path,body){ return fetch(BASE+API+path,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({token:TOKEN},body||{}))}).then(function(r){return r.json();}); }

  function setConn(on){ $('#dot').classList.toggle('on',on); $('#connlbl').textContent=on?t('conn'):t('off'); }

  function render(s){
    var idle=$('#idle'), paid=$('#paid');
    if(!s || (s.state!=='paid' && (!s.lines||!s.lines.length))){ idle.classList.add('show'); paid.classList.remove('show'); return; }
    if(s.state==='paid'){
      paid.classList.add('show'); idle.classList.remove('show');
      $('#paid-cur').textContent=CUR; $('#paid-total').textContent=EGP(s.total);
      $('#paid-change').textContent=(s.change>0.001)?(t('change')+' · '+CUR+' '+EGP(s.change)):'';
      return;
    }
    idle.classList.remove('show'); paid.classList.remove('show');
    var box=$('#items'); box.innerHTML='';
    (s.lines||[]).forEach(function(l){
      var d=document.createElement('div'); d.className='row';
      d.innerHTML='<span class="q num">'+INT(l.qty)+'×</span><span class="n">'+l.name+'</span><span class="p num">'+CUR+' '+EGP(l.price)+'</span>';
      box.appendChild(d);
    });
    box.scrollTop=box.scrollHeight;
    $('#sub').textContent=CUR+' '+EGP(s.subtotal);
    // service + vat split (server sends combined tax; show service+vat if derivable, else tax)
    var svc=s.subtotal*0.12, vat=(s.subtotal+svc)*0.14;
    if(Math.abs((svc+vat)-s.tax)<0.5){ $('#svc').textContent=CUR+' '+EGP(svc); $('#vat').textContent=CUR+' '+EGP(vat); }
    else { $('#svc').textContent='—'; $('#vat').textContent=CUR+' '+EGP(s.tax); }
    $('#total').textContent=EGP(s.total);
  }

  // A customer display is unauthenticated (token only), so the session-bound
  // Odoo websocket can't subscribe — we poll the token-authed snapshot instead.
  // The payload is tiny; a ~1.2s cadence keeps the screen feeling live.
  var _sig='';
  function poll(){
    call('/cfd/state',{config_id:CONFIG}).then(function(d){
      if(!d||!d.ok){ setConn(false); return; }
      setConn(true);
      var sig=JSON.stringify(d.snapshot||null);
      if(sig!==_sig){ _sig=sig; render(d.snapshot); }
    }).catch(function(){ setConn(false); });
  }
  function boot(){
    call('/cfd/state',{config_id:CONFIG}).then(function(d){
      if(!d||!d.ok){ setConn(false); setTimeout(boot,3000); return; }
      CUR=d.currency||'EGP'; $('#cur').textContent=CUR; $('#paid-cur').textContent=CUR;
      $('#branch').textContent=d.branch||'Welcome'; CHANNEL=d.channel;
      setConn(true); _sig=JSON.stringify(d.snapshot||null); render(d.snapshot);
      setInterval(poll,1200);
    }).catch(function(){ setConn(false); setTimeout(boot,3000); });
  }
  boot();
})();
</script>
</body>
</html>
